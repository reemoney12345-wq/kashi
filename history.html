<!DOCTYPE html>
<html lang="en">
<head>
<script>const API_BASE='https://kashi-atxm.onrender.com';</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f0f0f">
    <title>Watch History — Kashi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-main: #0f0f0f; --bg-card: #1a1a1a; --bg-elevated: #1e1e1e;
            --border-subtle: rgba(255,255,255,0.06); --border-visible: rgba(255,255,255,0.10);
            --text-primary: #e8e8e8; --text-secondary: #a0a0a0; --text-tertiary: #6b6b6b;
            --gold: #f0b93f; --gold-soft: rgba(240,185,63,0.12); --green: #2fa84f;
            --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 999px;
            --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;
            --touch-target: 48px;
        }
        html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body {
            font-family: var(--font-sans); background: var(--bg-main); color: var(--text-primary);
            line-height: 1.6; height: 100%; overflow-y: auto; padding: 24px;
        }
        body::-webkit-scrollbar { width: 4px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 4px; }
        svg { display: block; }
        .icon { stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
        h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 600; letter-spacing: -0.02em; color: var(--text-primary); }
        .mono { font-family: var(--font-mono); }
        .page-wrapper { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

        .page-tabs { display: flex; gap: 0; background: var(--bg-card); border-radius: var(--radius-md); padding: 4px; border: 1px solid var(--border-subtle); }
        .page-tab { flex: 1; padding: 10px 16px; border: none; border-radius: var(--radius-sm); background: transparent; color: var(--text-tertiary); font-family: var(--font-sans); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.15s ease; }
        .page-tab.active { background: var(--bg-main); color: var(--text-primary); }
        .page-tab:hover:not(.active) { color: var(--text-secondary); }
        .page-panel { display: none; }
        .page-panel.active { display: block; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .video-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; transition: border-color 0.15s ease; }
        .video-card:hover { border-color: var(--border-visible); }
        .video-thumb { aspect-ratio: 9/16; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        .video-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .video-thumb .thumb-placeholder { color: var(--text-tertiary); }
        .video-thumb .thumb-placeholder .icon { width: 32px; height: 32px; opacity: 0.4; }
        .video-thumb .thumb-duration { position: absolute; bottom: 6px; right: 6px; background: rgba(15,15,15,0.85); padding: 2px 6px; border-radius: 4px; font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-primary); }
        .video-thumb .thumb-ad-badge { position: absolute; top: 6px; left: 6px; background: var(--gold); color: #000; font-family: var(--font-mono); font-size: 0.6rem; font-weight: 600; letter-spacing: 0.04em; padding: 2px 6px; border-radius: 4px; }
        .video-card-info { padding: 10px 12px; }
        .video-card-info h4 { font-size: 0.82rem; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-card-info span { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-tertiary); }

        .empty-state { display: none; text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
        .empty-state.visible { display: block; }
        .empty-state .icon { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.3; }
        .empty-state h3 { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state p { font-size: 0.85rem; font-family: var(--font-mono); }

        @media (max-width: 640px) { body { padding: 16px; } .video-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); } }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="page-tabs" id="historyTabs">
            <button class="page-tab active" data-tab="watched">Watched</button>
            <button class="page-tab" data-tab="saved">Saved</button>
        </div>
        <div class="page-panel active" id="panelWatched">
            <div class="video-grid" id="watchedGrid"></div>
            <div class="empty-state visible" id="watchedEmpty">
                <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <h3>No watch history</h3><p>Videos you watch will appear here</p>
            </div>
        </div>
        <div class="page-panel" id="panelSaved">
            <div class="video-grid" id="savedGrid"></div>
            <div class="empty-state visible" id="savedEmpty">
                <svg class="icon" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78Z"/></svg>
                <h3>Nothing saved yet</h3><p>Tap save on any video to find it here</p>
            </div>
        </div>
    </div>
    <script>
        const $ = (sel) => document.querySelector(sel);
        let watched = [], saved = [];
        function esc(s) { const d = document.createElement('div'); d.textContent = s==null?'':String(s); return d.innerHTML; }
        async function load() {
            try {
                const [wr, sr] = await Promise.all([fetch(${API_BASE}/api/history'), fetch(${API_BASE}/api/saved')]);
                if (wr.ok) watched = await wr.json();
                if (sr.ok) saved = await sr.json();
            } catch (_) {}
            renderGrid('watchedGrid', 'watchedEmpty', watched);
            renderGrid('savedGrid', 'savedEmpty', saved);
        }
        function renderGrid(gridId, emptyId, items) {
            const grid = $('#'+gridId), empty = $('#'+emptyId);
            if (!items || items.length === 0) { grid.innerHTML = ''; empty.classList.add('visible'); return; }
            empty.classList.remove('visible');
            grid.innerHTML = items.map(v => `
                <div class="video-card" data-id="${v.id}">
                    <div class="video-thumb">
                        ${v.thumbnail ? `<img src="${esc(v.thumbnail)}" alt="" loading="lazy">` : `<div class="thumb-placeholder"><svg class="icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`}
                        ${v.duration ? `<span class="thumb-duration">${v.duration}</span>` : ''}
                        ${v.isSponsored ? '<span class="thumb-ad-badge">AD</span>' : ''}
                    </div>
                    <div class="video-card-info"><h4>${esc(v.caption||v.creatorName||'Untitled')}</h4><span>${esc(v.creatorName||'')}</span></div>
                </div>
            `).join('');
            grid.querySelectorAll('.video-card').forEach(card => {
                card.addEventListener('click', () => window.parent.postMessage({ type:'NAVIGATE', page:'feed', videoId:card.dataset.id }, '*'));
            });
        }
        document.querySelectorAll('#historyTabs .page-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#historyTabs .page-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.page-panel').forEach(p => p.classList.remove('active'));
                if (btn.dataset.tab === 'watched') $('#panelWatched').classList.add('active');
                else $('#panelSaved').classList.add('active');
            });
        });
        load();
    </script>
</body>
</html>
